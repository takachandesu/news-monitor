name: Refresh sekai-kabuka URL
on:
  schedule:
    - cron: '*/30 * * * *'   # 30分おき
  workflow_dispatch:         # 手動実行も可能

permissions:
  contents: write            # sekai_data_url.txt を commit するため

concurrency:
  group: refresh-sekai-url
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5       # 5分以内に終わらないなら異常
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright
        run: |
          pip install --quiet playwright
          if [ ! -d "$HOME/.cache/ms-playwright" ]; then
            playwright install --with-deps chromium
          else
            # キャッシュヒット時もブラウザ依存ライブラリだけは確実に入れる
            playwright install-deps chromium || true
          fi

      - name: Extract URL via Playwright
        run: python refresh_sekai_url.py

      - name: Commit if URL changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sekai_data_url.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No URL changes to commit."
          else
            git commit -m "Update sekai_data_url [skip ci]"
            git push
          fi
