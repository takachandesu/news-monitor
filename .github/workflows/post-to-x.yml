name: Post breaking news to X

on:
  schedule:
    - cron: '2,17,32,47 * * * *' # 毎時 :02, :17, :32, :47（news取得の1分後）      # 10分おき（UTC、ただし JST/UTC で結果は同じ）
  workflow_dispatch:             # 手動実行も可能

permissions:
  contents: write                # state.json を commit するため

concurrency:
  group: post-to-x
  cancel-in-progress: false      # 多重起動防止（前のジョブが終わるまで新しいのを待たせる）

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 8           # 万一スクリプトが詰まった時の保険

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet requests tweepy anthropic

      - name: Run posting script
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          CLAUDE_API_KEY:    ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
        run: python post_to_x.py

      - name: Commit state if changed
        if: always()              # スクリプトが部分的に成功した場合も state を残す
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update posted state [skip ci]"
            git push
          fi
